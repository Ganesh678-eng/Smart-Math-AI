<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Math AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e5ddd5;
}

#chat{
  height:85vh;
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:75%;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.user{
  background:#dcf8c6;
  margin-left:auto;
}

.bot{
  background:white;
}

#bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:5px;
}

#input{
  width:60%;
  padding:10px;
}

button{
  padding:10px;
  border:none;
  background:green;
  color:white;
}

select{
  padding:8px;
}

</style>
</head>

<body>

<div id="chat"></div>

<div id="bottom">

<select id="lang">
  <option value="en">English</option>
  <option value="bn">Bengali</option>
  <option value="hi">Hindi</option>
</select>

<input id="input" placeholder="Type math...">

<input type="file" id="photo">

<button onclick="send()">Send</button>

</div>

<script>

function send(){

  let input = document.getElementById("input").value.trim();
  let lang = document.getElementById("lang").value;

  if(input==="") return;

  addMsg(input,"user");
  document.getElementById("input").value="";

  // FIX INPUT
  let fixed = input
    .replace(/x/gi,"*")
    .replace(/÷/g,"/")
    .replace(/of/gi,"*")
    .replace("%","/100*");

  try{

    let answer = Function('"use strict";return (' + fixed + ')')();

    let reply = "";

    if(lang==="bn"){
      reply = "উত্তর: " + answer + "<br><br>";
      reply += "<b>(i) " + input + "</b><br>";
      reply += "• BODMAS নিয়ম অনুসরণ করা হয়েছে<br>";
      reply += "• আগে ভাগ, তারপর গুণ, তারপর যোগ/বিয়োগ<br>";
      reply += "<br>Final Answer: " + answer;
    }

    else if(lang==="hi"){
      reply = "उत्तर: " + answer + "<br><br>";
      reply += "<b>(i) " + input + "</b><br>";
      reply += "• BODMAS नियम लागू किया गया<br>";
      reply += "• पहले भाग, फिर गुणा, फिर जोड़/घटाव<br>";
      reply += "<br>Final Answer: " + answer;
    }

    else{
      reply = "Answer: " + answer + "<br><br>";
      reply += "<b>(i) " + input + "</b><br>";
      reply += "• BODMAS rule applied<br>";
      reply += "• Division → Multiplication → Addition/Subtraction<br>";
      reply += "<br>Final Answer: " + answer;
    }

    addMsg(reply,"bot");

  }catch{
    addMsg("❌ Invalid Input (Try: 2+2, 5*6, 10% of 500)","bot");
  }

}

function addMsg(text,type){

  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerHTML = text;

  document.getElementById("chat").appendChild(div);

  document.getElementById("chat").scrollTop =
  document.getElementById("chat").scrollHeight;
}

</script>

</body>
  </html>

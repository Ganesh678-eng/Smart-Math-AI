<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Math AI</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#e5ddd5;
}

#chat{
  height:90vh;
  overflow-y:auto;
  padding:10px;
}

.msg{
  max-width:70%;
  padding:10px;
  margin:10px;
  border-radius:10px;
}

.user{
  background:#dcf8c6;
  margin-left:auto;
}

.bot{
  background:white;
}

#inputBox{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
}

#input{
  flex:1;
  padding:10px;
  font-size:16px;
}

button{
  padding:10px;
  background:green;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="input" placeholder="Type math...">
  <button onclick="send()">Send</button>
</div>

<script>

function send(){

  let input = document.getElementById("input").value;
  document.getElementById("input").value = "";

  addMsg(input,"user");

  let fixed = input
    .replace(/x/g,"*")
    .replace(/X/g,"*")
    .replace(/÷/g,"/")
    .replace("of","*");

  try{

    let answer = eval(fixed);

    let reply =
    "Answer: " + answer + "<br><br>" +

    "<b>(i) " + input + "</b><br>" +

    "• প্রথমে BODMAS rule follow করা হয়<br>";

    if(fixed.includes("/")) reply += "• Division করা হয়<br>";
    if(fixed.includes("*")) reply += "• Multiplication করা হয়<br>";
    if(fixed.includes("+")) reply += "• Addition করা হয়<br>";
    if(fixed.includes("-")) reply += "• Subtraction করা হয়<br>";

    reply += "<br>Final Answer: " + answer;

    addMsg(reply,"bot");

  }catch{
    addMsg("Invalid Input ❌ (Try: 2+2, 5*6, 10% of 500)","bot");
  }

}

function addMsg(text,type){

  let div = document.createElement("div");
  div.classList.add("msg");
  div.classList.add(type);

  div.innerHTML = text;

  document.getElementById("chat").appendChild(div);

  document.getElementById("chat").scrollTop =
  document.getElementById("chat").scrollHeight;
}

</script>

</body>
</html>

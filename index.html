<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Math AI</title>

<style>
body{
  font-family:Arial;
  background:#f4f4f4;
  text-align:center;
  padding:20px;
}

h1{color:#333;}

input{
  width:80%;
  padding:10px;
  font-size:18px;
}

button{
  padding:10px 20px;
  margin-top:10px;
  font-size:18px;
  background:green;
  color:white;
  border:none;
  border-radius:5px;
}

#result{
  margin-top:20px;
  font-size:22px;
}

#steps{
  margin-top:15px;
  font-size:16px;
  text-align:left;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Smart Math AI 🧮</h1>

<input type="text" id="input" placeholder="Example: 2*2/2+2 or 10% of 500">
<br>

<button onclick="solve()">Solve</button>

<div id="result"></div>
<div id="steps"></div>

<script>

function solve(){

  let input = document.getElementById("input").value;
  let result = document.getElementById("result");
  let steps = document.getElementById("steps");

  try{

    let answer = eval(input.replace("×","*").replace("÷","/"));

    result.innerHTML = "Answer: " + answer;

    let explain = "";

    // (i) format
    explain += "(i) " + input + "<br>";

    // BODMAS explanation
    explain += "<br><b>Step by Step (BODMAS Rule):</b><br>";

    if(input.includes("/") || input.includes("÷")){
      explain += "• প্রথমে ভাগ করা হয় (Division)<br>";
    }

    if(input.includes("*") || input.includes("×")){
      explain += "• তারপর গুণ করা হয় (Multiplication)<br>";
    }

    if(input.includes("+")){
      explain += "• তারপর যোগ করা হয় (Addition)<br>";
    }

    if(input.includes("-")){
      explain += "• তারপর বিয়োগ করা হয় (Subtraction)<br>";
    }

    // percentage
    if(input.includes("%")){
      explain += "<br><b>(ii) সূত্র:</b><br>";
      explain += "Percentage = (value / 100) × total<br>";
    }

    // final step
    explain += "<br><b>Final Answer: " + answer + "</b>";

    steps.innerHTML = explain;

  }catch{
    result.innerHTML = "Invalid Input ❌";
    steps.innerHTML = "";
  }

}

</script>

</body>
</html>
